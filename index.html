<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HTML Email Previewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#ebebea;
  --tx:#1c1c1a;--tx2:#6b6b68;--tx3:#9d9d9a;
  --br:rgba(0,0,0,0.1);--br2:rgba(0,0,0,0.16);
  --accent:#1c1c1a;--accent-fg:#fff;
  --rm:8px;--rl:12px;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#262626;--bg3:#111;
  --tx:#f0f0ee;--tx2:#a0a09e;--tx3:#6b6b68;
  --br:rgba(255,255,255,0.08);--br2:rgba(255,255,255,0.14);
  --accent:#f0f0ee;--accent-fg:#1c1c1c
}}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg3);display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg);border-bottom:0.5px solid var(--br);flex-shrink:0;flex-wrap:wrap}
.topbar-title{font-size:13px;font-weight:500;color:var(--tx);display:flex;align-items:center;gap:6px;flex:1;min-width:120px}
.topbar-title i{font-size:15px;color:var(--tx2)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toggle-group{display:flex;border:0.5px solid var(--br2);border-radius:var(--rm);overflow:hidden}
.toggle-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;font-size:12px;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--tx2);font-family:var(--sans);transition:background .12s,color .12s}
.toggle-btn.active{background:var(--bg2);color:var(--tx)}
.toggle-btn i{font-size:14px}
.run-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;font-size:12px;font-weight:500;background:var(--accent);color:var(--accent-fg);border:none;border-radius:var(--rm);cursor:pointer;font-family:var(--sans);transition:opacity .12s}
.run-btn:hover{opacity:.82}
.share-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;font-size:12px;font-weight:500;background:transparent;color:var(--tx2);border:0.5px solid var(--br2);border-radius:var(--rm);cursor:pointer;font-family:var(--sans);transition:background .12s,color .12s}
.share-btn:hover{background:var(--bg2);color:var(--tx)}
.share-btn i{font-size:13px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.modal-box{background:var(--bg);border:0.5px solid var(--br2);border-radius:var(--rl);padding:22px 24px;width:min(520px,90vw);font-family:var(--sans)}
.modal-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px}
.modal-hint{font-size:12px;color:var(--tx2);margin-bottom:14px;line-height:1.5}
.modal-row{display:flex;gap:8px;align-items:center}
.modal-row input{flex:1;font-family:var(--mono);font-size:11px;padding:8px 10px;border:0.5px solid var(--br2);border-radius:var(--rm);background:var(--bg2);color:var(--tx);outline:none}
.modal-copy{display:inline-flex;align-items:center;padding:8px 16px;font-size:12px;font-weight:500;background:var(--accent);color:var(--accent-fg);border:none;border-radius:var(--rm);cursor:pointer;font-family:var(--sans);white-space:nowrap}
.modal-close{margin-top:14px;font-size:12px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:0}
.modal-close:hover{color:var(--tx)}
.main{display:flex;flex:1;overflow:hidden}
.editor-pane{display:flex;flex-direction:column;width:44%;min-width:260px;border-right:0.5px solid var(--br);background:var(--bg)}
.pane-label{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-bottom:0.5px solid var(--br);flex-shrink:0;display:flex;align-items:center;gap:5px}
.pane-label i{font-size:13px}
textarea#code{flex:1;width:100%;border:none;outline:none;resize:none;font-family:var(--mono);font-size:11.5px;line-height:1.7;padding:12px 14px;background:transparent;color:var(--tx);tab-size:2}
.preview-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.preview-scroll{flex:1;overflow:auto;padding:20px;display:flex;justify-content:center;align-items:flex-start;background:var(--bg3)}
.device-shell{transition:width .22s ease}
.device-shell.desktop{width:100%;max-width:640px}
.device-shell.mobile{width:375px;max-width:375px}
.device-bar{border-radius:12px 12px 0 0;background:var(--bg2);border:0.5px solid var(--br);border-bottom:none;padding:8px 14px;display:flex;align-items:center;gap:6px}
.dot{width:9px;height:9px;border-radius:50%}
.d1{background:#ff5f57}.d2{background:#febc2e}.d3{background:#28c840}
.url-bar{flex:1;background:var(--bg3);border-radius:5px;height:17px;margin:0 10px}
.device-shell.mobile .url-bar{display:none}
.iframe-wrap{border:0.5px solid var(--br);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;background:#fff}
.device-shell.mobile .iframe-wrap{border-radius:0 0 22px 22px}
iframe{display:block;width:100%;border:none;background:#fff;min-height:200px}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--tx3);font-size:13px;padding:48px 20px;text-align:center;font-family:var(--sans)}
.placeholder i{font-size:36px;opacity:.45}
.placeholder span{font-size:12px;margin-top:2px}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">
    <i class="ti ti-mail" aria-hidden="true"></i>
    HTML Email Previewer
  </span>
  <div class="topbar-right">
    <div class="toggle-group" role="group" aria-label="Preview device">
      <button class="toggle-btn active" id="btn-desktop" onclick="setDevice('desktop')">
        <i class="ti ti-device-desktop" aria-hidden="true"></i> Desktop
      </button>
      <button class="toggle-btn" id="btn-mobile" onclick="setDevice('mobile')">
        <i class="ti ti-device-mobile" aria-hidden="true"></i> Mobile
      </button>
    </div>
    <button class="share-btn" onclick="saveToURL()" title="Bake code into URL — paste that URL into Notion /embed">
      <i class="ti ti-link" aria-hidden="true"></i> Save &amp; Copy Link
    </button>
    <button class="run-btn" onclick="runPreview()">
      <i class="ti ti-player-play" aria-hidden="true"></i> Preview
    </button>
  </div>
</div>

<div class="main">
  <div class="editor-pane">
    <div class="pane-label"><i class="ti ti-code" aria-hidden="true"></i> HTML Code</div>
    <textarea id="code" spellcheck="false" placeholder="Paste your HTML email here…" onkeydown="handleTab(event)"></textarea>
  </div>
  <div class="preview-pane">
    <div class="pane-label"><i class="ti ti-eye" aria-hidden="true"></i> Preview</div>
    <div class="preview-scroll">
      <div class="device-shell desktop" id="device-shell">
        <div class="device-bar">
          <div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div>
          <div class="url-bar"></div>
        </div>
        <div class="iframe-wrap">
          <div id="placeholder-msg" class="placeholder">
            <i class="ti ti-file-code" aria-hidden="true"></i>
            Paste HTML &amp; click Preview
            <span>Use "Save &amp; Copy Link" to share or embed in Notion</span>
          </div>
          <iframe id="preview-frame" style="display:none" title="Email preview"></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title">Your shareable link</div>
    <div class="modal-hint" id="modal-hint"></div>
    <div class="modal-row">
      <input id="modal-url" type="text" readonly onclick="this.select()">
      <button class="modal-copy" id="modal-copy-btn" onclick="copyModalURL()">Copy</button>
    </div>
    <br>
    <button class="modal-close" onclick="closeModal()">✕ Close</button>
  </div>
</div>

<script>
var currentDevice = 'desktop';

function encodeCode(str) {
  try { return btoa(unescape(encodeURIComponent(str))); } catch(e) { return ''; }
}
function decodeCode(str) {
  try { return decodeURIComponent(escape(atob(str))); } catch(e) { return ''; }
}

function saveToURL() {
  var code = document.getElementById('code').value.trim();
  if (!code) { showModal('', true); return; }
  var encoded = encodeCode(code);
  if (!encoded) { showModal('', true); return; }
  var hash = '#v=1&d=' + currentDevice + '&c=' + encoded;
  var origin = location.hostname;
  var isLocal = (origin === '' || origin === 'localhost' || origin.indexOf('claudeusercontent') !== -1 || location.protocol === 'blob:');
  if (isLocal) {
    showModal(hash, false, true);
  } else {
    var base = location.href.split('#')[0];
    showModal(base + hash, false, false);
  }
}

function showModal(url, empty, hashOnly) {
  document.getElementById('modal-overlay').style.display = 'flex';
  var inp = document.getElementById('modal-url');
  var hint = document.getElementById('modal-hint');
  var btn = document.getElementById('modal-copy-btn');
  if (empty) {
    inp.value = '';
    hint.textContent = 'Paste your HTML email first, then click Save & Copy Link.';
    btn.style.display = 'none';
  } else if (hashOnly) {
    inp.value = url;
    hint.innerHTML = 'You\'re previewing locally. Once hosted on GitHub Pages, open your GitHub URL and click "Save & Copy Link" there — it will produce the full embeddable link.<br><br>Your encoded hash (for reference):';
    btn.style.display = 'none';
    setTimeout(function() { inp.select(); inp.setSelectionRange(0, 99999); }, 60);
  } else {
    inp.value = url;
    hint.textContent = 'Copy this URL and paste into Notion → /embed';
    btn.style.display = 'inline-flex';
    setTimeout(function() { inp.select(); inp.setSelectionRange(0, 99999); }, 60);
  }
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function copyModalURL() {
  var inp = document.getElementById('modal-url');
  inp.select(); inp.setSelectionRange(0, 99999);
  var btn = document.getElementById('modal-copy-btn');
  try {
    var ok = document.execCommand('copy');
    if (ok) { btn.textContent = '✓ Copied!'; setTimeout(function(){ btn.textContent = 'Copy'; }, 2000); return; }
  } catch(e) {}
  if (navigator.clipboard) {
    navigator.clipboard.writeText(inp.value).then(function() {
      btn.textContent = '✓ Copied!'; setTimeout(function(){ btn.textContent = 'Copy'; }, 2000);
    }).catch(function() {});
  }
}

function loadFromURL() {
  var hash = location.hash;
  if (!hash || hash.length < 5) return false;
  try {
    var raw = hash.slice(1);
    var params = {};
    raw.split('&').forEach(function(part) {
      var eq = part.indexOf('=');
      if (eq > -1) params[part.slice(0, eq)] = part.slice(eq + 1);
    });
    if (!params.c) return false;
    var code = decodeCode(params.c);
    if (!code) return false;
    document.getElementById('code').value = code;
    if (params.d && (params.d === 'mobile' || params.d === 'desktop')) {
      currentDevice = params.d;
      applyDevice();
    }
    runPreview();
    return true;
  } catch(e) { return false; }
}

function applyDevice() {
  document.getElementById('device-shell').className = 'device-shell ' + currentDevice;
  document.getElementById('btn-desktop').className = 'toggle-btn' + (currentDevice === 'desktop' ? ' active' : '');
  document.getElementById('btn-mobile').className = 'toggle-btn' + (currentDevice === 'mobile' ? ' active' : '');
}

function setDevice(d) {
  currentDevice = d;
  applyDevice();
  var frame = document.getElementById('preview-frame');
  if (frame.style.display !== 'none') {
    frame.style.width = d === 'mobile' ? '375px' : '100%';
    setTimeout(function() { sizeFrame(frame); }, 80);
  }
}

function runPreview() {
  var code = document.getElementById('code').value.trim();
  if (!code) return;
  var frame = document.getElementById('preview-frame');
  document.getElementById('placeholder-msg').style.display = 'none';
  frame.style.display = 'block';
  frame.style.width = currentDevice === 'mobile' ? '375px' : '100%';
  var doc = frame.contentDocument || frame.contentWindow.document;
  doc.open(); doc.write(code); doc.close();
  frame.style.height = '0';
  setTimeout(function() { sizeFrame(frame); }, 150);
}

function sizeFrame(frame) {
  try {
    var h = frame.contentDocument.body.scrollHeight;
    frame.style.height = Math.max(h, 200) + 'px';
  } catch(e) { frame.style.height = '500px'; }
}

function handleTab(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var ta = e.target, s = ta.selectionStart;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
  }
}



window.addEventListener('load', function() {
  loadFromURL();
});
</script>
</body>
</html>
